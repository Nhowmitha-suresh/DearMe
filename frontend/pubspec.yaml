name: dearme
description: "A beautiful Flutter app for personal wellness and self-care with AI companion support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0

  # Networking
  dio: ^5.3.1
  retrofit: ^4.1.0
  json_serializable: ^6.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0

  # Notifications
  firebase_messaging: ^14.6.0

  # Date & Time
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.63.0
  table_calendar: ^3.0.9

  # Utils
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.1
  device_info_plus: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
